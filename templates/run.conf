# agentbox box profile: run — Claude Code is installed, but you land in a shell (type 'claude' when you want it). YOUR copy.
# template-version: 3.9.0                    # bumps when this template gains new options — ab tells you if yours is behind
# Simple mode: AGENT=claude bakes in the Claude Code toolchain; RUN="" just means "drop me at a shell", not "launch it".
AGENT=claude                        # who runs the box:  claude · codex · copilot · none
PKGS="gh git curl"                  # extra apt packages baked in — 'gh' also sets up GitHub so you can push (with GH_TOKEN)
TOKENS="CLAUDE_CODE_OAUTH_TOKEN GH_TOKEN"  # your saved keys passed in — run 'claude' in the box, and push with GH_TOKEN
RUN=""                              # empty = a plain shell on entry;  `ab run <cmd>` runs <cmd> instead
MOUNT=cwd                           # cwd = share this folder (opens as /work-<name>) · none = share nothing (sealed)
EPHEMERAL=0                         # 0 = keep the box around (quick to re-enter) · 1 = fresh box each run, gone on exit
#DIST=debian                        # base distro for this box (overrides the global default) — e.g. debian, ubuntu, kali
#MITM=0                             # 1 = watch the box's web traffic through mitmweb (proxy 127.0.0.1:8082, viewer :8083)
