# agentbox box profile: run — Claude Code installed, but opens a shell (run 'claude' yourself). YOUR copy; edit freely.
# template-version: 3.9.0                    # bumps when THIS template's content changes (ab warns if your copy is behind)
# Simple mode: AGENT=claude bakes in the Claude Code toolchain; RUN="" drops you at a shell instead of launching it.
AGENT=claude                        # claude | codex | copilot | none — picks the install recipe
PKGS="gh git curl"                  # extra apt packages; 'gh' also wires GitHub's repo + git cred helper (push via GH_TOKEN)
TOKENS="CLAUDE_CODE_OAUTH_TOKEN GH_TOKEN"  # injected agent.env keys; run 'claude' in the box, push via GH_TOKEN
RUN=""                              # empty = an interactive shell; `ab run <cmd>` runs <cmd> instead
MOUNT=cwd                           # cwd = bind the launch folder (opens as /work-<cwd>) | none = sealed (bind nothing)
EPHEMERAL=0                         # 0 = keep the box between runs (fast) | 1 = rebuild fresh each run + delete on exit
#DIST=debian                        # base distro for THIS box (overrides the global AGENTBOX_DIST); e.g. debian, ubuntu, kali
#MITM=0                             # 1 = route the box's traffic through mitmweb (proxy 127.0.0.1:8082, UI :8083)
