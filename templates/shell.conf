# agentbox box profile: shell — a bare shell scoped to ONE folder (no agent). YOUR copy; edit freely.
# Simple mode: AGENT=none installs nothing but PKGS. Need custom build steps? set INSTALL='…' (docker mode).
AGENT=none                          # claude | codex | copilot | none
PKGS="gh git curl"                  # extra apt packages; 'gh' also wires GitHub's repo + git cred helper (push via GH_TOKEN)
TOKENS=""                           # inject nothing
RUN=""                              # empty = an interactive shell; `ab shell <cmd>` runs <cmd> instead
MOUNT=cwd                           # cwd = bind the launch folder (opens as /work-<cwd>) | none = sealed (bind nothing)
EPHEMERAL=0                         # 0 = keep the box between runs (fast) | 1 = rebuild fresh each run + delete on exit
#MITM=0                             # 1 = route the box's traffic through mitmweb (proxy 127.0.0.1:8082, UI :8083)
