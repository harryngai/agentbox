# agentbox box profile: web — a throwaway xfce desktop for risky browsing (chromium in KasmVNC). YOUR copy, tweak it freely.
# template-version: 3.9.1                    # bumps when this template gains new options — ab tells you if yours is behind
# `ab web` opens the desktop at http://localhost:6902; chromium's traffic runs through mitmweb so you can watch it.
AGENT=none                          # no agent here — the desktop + browser come from DESKTOP/APP below
PKGS=""                             # nothing extra — a browsing box needs no dev toolchain (xfce + chromium come from DESKTOP)
TOKENS=""                           # nothing passed in — this box holds none of your keys
RUN=""                              # unused for a desktop box (DESKTOP takes over)
MOUNT=cwd                           # cwd = share this folder (opens as /work-<name>) · none = share nothing (sealed)
EPHEMERAL=1                         # throwaway: a fresh box each run, deleted when you close the desktop
DESKTOP=xfce                        # scoped KasmVNC desktop — a minimal xfce with a black background
APP=browser                         # browser = chromium only · code = also run code-server (VS Code in the browser)
MITM=1                              # route chromium through mitmweb to watch its traffic (viewer :8083 in the box)
#DIST=debian                        # base distro for this box (overrides the global default) — e.g. debian, ubuntu, kali
