# agentbox box profile: web — a throwaway xfce desktop for risky browsing (chromium only, no code-server). YOUR copy.
# `ab web` opens a KasmVNC desktop; nothing of yours is bound (MOUNT=none) and the box rebuilds fresh each run.
AGENT=none                          # no agent — the desktop + browser come from DESKTOP/APP below
PKGS="gh git curl"                  # extra apt packages; 'gh' also wires GitHub's repo + git cred helper (push via GH_TOKEN)
TOKENS=""
RUN=""
MOUNT=none                          # sealed: never bind your folders into a browsing box
EPHEMERAL=1                         # throwaway: a fresh box each run, deleted on exit
DESKTOP=xfce                        # scoped KasmVNC desktop — minimal xfce, black background
APP=browser                         # browser = chromium only (no code-server) | code = code-server (VS Code)
#MITM=1                             # 1 = route chromium through mitmweb to inspect its traffic (UI :8083 in the box)
