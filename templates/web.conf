# agentbox box profile: web — a throwaway xfce desktop for risky browsing (chromium only, no code-server). YOUR copy.
# template-version: 3.9.0                    # bumps when THIS template's content changes (ab warns if your copy is behind)
# `ab web` opens a KasmVNC desktop bound to the launch folder; chromium's traffic routes through mitmweb (UI :8083).
AGENT=none                          # no agent — the desktop + browser come from DESKTOP/APP below
PKGS="git"                          # minimal — a browsing box needs no gh/curl toolchain
TOKENS=""                           # inject nothing (no gh here, so no GH_TOKEN)
RUN=""
MOUNT=cwd                           # cwd = bind the launch folder (opens as /work-<cwd>) | none = sealed (bind nothing)
EPHEMERAL=1                         # throwaway: a fresh box each run, deleted on exit
DESKTOP=xfce                        # scoped KasmVNC desktop — minimal xfce, black background
APP=browser                         # browser = chromium only (no code-server) | code = code-server (VS Code)
MITM=1                              # route chromium through mitmweb to inspect its traffic (UI :8083 in the box)
#DIST=debian                        # base distro for THIS box (overrides the global AGENTBOX_DIST); e.g. debian, ubuntu, kali
