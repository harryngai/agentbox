# agentbox box profile: codex — OpenAI Codex scoped to ONE folder. YOUR copy; edit freely.
# Simple mode: AGENT picks a built-in install recipe — no shell to write. Full control? set INSTALL='…' (docker mode).
AGENT=codex                         # claude | codex | copilot | none — picks the install recipe
PKGS=""                             # extra apt packages to bake in (space-separated), optional
TOKENS="OPENAI_API_KEY"             # only these agent.env keys are injected; nothing else of yours reaches the box
RUN="codex"                         # command on entry (empty = a shell); `ab codex <cmd>` overrides it
MOUNT=cwd                           # cwd = bind the launch folder (opens as /work-<cwd>) | none = sealed (bind nothing)
EPHEMERAL=0                         # 0 = keep the box between runs (fast) | 1 = rebuild fresh each run + delete on exit
#MITM=0                             # 1 = route the box's traffic through mitmweb (proxy 127.0.0.1:8082, UI :8083)
