# agentbox box profile: claude — Claude Code, kept to just this one folder. YOUR copy, tweak it freely.
# template-version: 3.8.0                    # bumps when this template gains new options — ab tells you if yours is behind
# Reinstalling agentbox never touches this file (the pristine copy lives under ~/.local/share/agentbox/templates).
# Simple mode — just pick an AGENT and go. Want full control? Set INSTALL='…' and write the build steps yourself.
AGENT=claude                        # who runs the box:  claude · codex · copilot · none
PKGS="gh git curl"                  # extra apt packages baked in — 'gh' also sets up GitHub so you can push (with GH_TOKEN)
TOKENS="CLAUDE_CODE_OAUTH_TOKEN GH_TOKEN"  # which of your saved keys get passed in — nothing else of yours leaks into the box
RUN="claude"                        # what runs when you enter (empty = a plain shell);  `ab claude <cmd>` overrides it
MOUNT=cwd                           # cwd = share this folder (opens as /work-<name>) · none = share nothing (sealed)
EPHEMERAL=0                         # 0 = keep the box around (quick to re-enter) · 1 = fresh box each run, gone on exit
#DIST=debian                        # base distro for this box (overrides the global default) — e.g. debian, ubuntu, kali
#MITM=0                             # 1 = watch the box's web traffic through mitmweb (proxy 127.0.0.1:8082, viewer :8083)
