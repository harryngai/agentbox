# agentbox box profile: claude — Claude Code scoped to ONE folder. YOUR copy; edit freely
# (reinstalling agentbox never touches it; the pristine template lives in ~/.local/share/agentbox/templates).
# Simple mode: AGENT picks a built-in install recipe — no shell to write. Full control? set INSTALL='…' (docker mode).
AGENT=claude                        # claude | codex | copilot | none — picks the install recipe
PKGS="gh"                           # extra apt packages; 'gh' also wires GitHub's repo + git cred helper (push via GH_TOKEN)
TOKENS="CLAUDE_CODE_OAUTH_TOKEN GH_TOKEN"  # injected agent.env keys; GH_TOKEN lets the box push to GitHub
RUN="claude"                        # command on entry (empty = a shell); `ab claude <cmd>` overrides it
MOUNT=cwd                           # cwd = bind the launch folder (opens as /work-<cwd>) | none = sealed (bind nothing)
EPHEMERAL=0                         # 0 = keep the box between runs (fast) | 1 = rebuild fresh each run + delete on exit
#DIST=debian                        # base distro for THIS box (overrides the global AGENTBOX_DIST); e.g. debian, ubuntu, kali
#MITM=0                             # 1 = route the box's traffic through mitmweb (proxy 127.0.0.1:8082, UI :8083)
