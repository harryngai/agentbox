# agentbox box profile: desktop — a full Ubuntu xfce desktop with the Mesa/Vulkan GPU stack (complex mode). YOUR copy.
# template-version: 3.10.0                   # bumps when this template gains new options — ab tells you if yours is behind
# Complex mode: INSTALL='…' runs your raw build steps verbatim, so AGENT/PKGS are ignored — this is "write it yourself".
# Here it builds a full xfce4 desktop on Ubuntu, a real (non-snap) Firefox, and the Mesa/Vulkan userspace so GL/Vulkan
# apps can try the phone's GPU (Turnip = Adreno Vulkan, Zink = GL-on-Vulkan).
# GPU note — be realistic: on UNROOTED Android via proot the desktop launches isolated with no GPU device bound, so Mesa
# usually falls back to software (llvmpipe/lavapipe). Everything still runs, just not hardware-accelerated. Test it in a
# desktop terminal:  vulkaninfo | grep deviceName  ·  vkcube  ·  gpu glxgears   (the 'gpu' wrapper forces GL through Zink).
DIST=ubuntu                         # full Ubuntu base — these build steps assume Ubuntu package names
DESKTOP=xfce                        # wires up KasmVNC (open http://localhost:6902, user: agent) and launches xfce
APP=browser                         # browser = no code-server (this build adds real Firefox below) · code = also code-server
MOUNT=cwd                           # cwd = share this folder (opens as /work-<name>) · none = share nothing (sealed)
EPHEMERAL=0                         # 0 = keep it (a full desktop is heavy to rebuild) · 1 = fresh every run, gone on close
TOKENS=""                           # no agent keys needed here — add some if your own build steps want them
#MITM=0                             # 1 = watch the desktop's web traffic through mitmweb (viewer :8083 in the box)
INSTALL='
# --- a full xfce4 desktop + everyday apps ---
apt-get install -y xfce4 xfce4-goodies thunar mousepad xfce4-terminal fonts-noto fonts-noto-color-emoji
# --- a real (non-snap) Firefox from Mozilla, pinned so it wins over Ubuntu snap transitional package ---
install -d -m 0755 /etc/apt/keyrings
curl -fsSL https://packages.mozilla.org/apt/repo-signing-key.gpg -o /etc/apt/keyrings/packages.mozilla.org.asc
echo "deb [signed-by=/etc/apt/keyrings/packages.mozilla.org.asc] https://packages.mozilla.org/apt mozilla main" > /etc/apt/sources.list.d/mozilla.list
printf "Package: *\nPin: origin packages.mozilla.org\nPin-Priority: 1000\n" > /etc/apt/preferences.d/mozilla
apt-get update && apt-get install -y firefox || true
# --- Mesa + Vulkan GPU userspace and test tools (Turnip + Zink ship in modern Mesa) ---
apt-get install -y mesa-utils mesa-vulkan-drivers vulkan-tools libgl1-mesa-dri libglx-mesa0
# --- gpu <cmd>: run one command with GL routed through Vulkan/Turnip. Opt-in per command, so it never destabilises xfce ---
cat > /usr/local/bin/gpu <<"SH"
#!/bin/sh
export MESA_LOADER_DRIVER_OVERRIDE=zink GALLIUM_DRIVER=zink TU_DEBUG=noconform
exec "$@"
SH
chmod +x /usr/local/bin/gpu
'
